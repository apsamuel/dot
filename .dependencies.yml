# ─────────────────────────────────────────────────────────────────────────────
# Tier Reference:
#   0 = bootstrap essentials (required for dot to function)
#   1 = language toolchains (needed for dev workflows)
#   2 = daily-use CLI tools (quality-of-life, plugins)
#   3 = domain-specific modules (SRE, A/V, VM, etc.)
#   4 = vendor framework runtime (macOS system tools, not installable via brew)
#
# Category Reference:
#   shell, pkg, data, python, node, rust, java, apple, tui, output, net,
#   vcs, env, k8s, container, sre, av, vm, git, nav, util, iac, js, term
# ─────────────────────────────────────────────────────────────────────────────

