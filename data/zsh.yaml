# TODO: I want to embed zsh settings in a top-level key named .zsh
# TODO: I want to embed tmux settings in a top-level key named .tmux
# .zsh
# .tmux
theme: 'powerlevel10k/powerlevel10k' # the oh-my-zsh theme to use, can be overridden by custom themes
path: # a list of paths to dynamically append to the $PATH variable, can be overridden by users below
conditions: # a list of conditions to check before loading the shell, can be overridden by users below
  network:
    home: '192.168.0.1'
  host:
    home: 'prometheus'
languages: # language-specific dependencies to install, can be overridden by users below
  python: # python dependencies to install via pip
    version: '3.11.13'
    pip:
      requirements:
        - 'libtmux==0.36.0'
  node: # node dependencies to install via npm
    version: '24.15.0'
    npm:
      requirements:
        - '@google/gemini-cli'
        - '@openai/codex'
options: # a list of zsh options to set, can be overridden by users below
  - 'autopushd'
  - 'BANG_HIST'
  - 'extendedglob'
  - 'extendedhistory'
  - 'hist_ignore_all_dups'
  - 'histexpiredupsfirst'
  - 'histfindnodups'
  - 'histignorealldups'
  - 'histignoredups'
  - 'histignorespace'
  - 'histnostore'
  - 'histreduceblanks'
  - 'histsavenodups'
  - 'histverify'
  - 'incappendhistory'
  - 'share_history'
  - 'sharehistory'
plugins: # oh-my-zsh plugins to load, can be overridden by users below
  builtin: # a list of builtin oh-my-zsh plugins to load, can be overridden by users below
    - 'aliases'
    - 'alias-finder'
    - 'ansible'
    - 'autopep8'
    - 'brew'
    - 'colored-man-pages'
    - 'colorize'
    - 'copybuffer'
    - 'copypath'
    - 'dash'
    - 'deno'
    - 'direnv'
    - 'docker-compose'
    - 'docker'
    - 'emoji-clock'
    - 'emoji'
    - 'fzf'
    - 'gh'
    - 'git-extras'
    - 'git'
    - 'gitignore'
    - 'gnu-utils'
    - 'history'
    - 'kubectl'
    - 'nmap'
    - 'node'
    - 'npm'
    - 'python'
    - 'shrink-path'
    - 'ssh-agent'
    - 'thefuck'
    - 'web-search'
  custom: # a list of custom oh-my-zsh plugins to load as nested submodules, can be overridden by users below
    - owner: 'conda-incubator'
      repo: 'conda-zsh-completion'
      exec: ''
      enabled: false
    - owner: 'zsh-users'
      repo: 'zsh-autosuggestions'
      exec: ''
      enabled: true
    - owner: 'z-shell'
      repo: 'F-Sy-H'
      exec: ''
      enabled: true
    - owner: 'Aloxaf'
      repo: 'fzf-tab'
      exec: ''
      enabled: false
    - owner: 'denisidoro'
      repo: 'navi'
      exec: ''
      enabled: false
    - owner: 'jeffreytse'
      repo: 'zsh-vi-mode'
      exec: ''
      enabled: false
    - owner: 'tom-doerr'
      repo: 'zsh_codex'
      exec: ''
      enabled: false
themes:
  builtin: # not used, may not need
  custom: # what custom themes we want to load as oh-my-zsh submodules, can be overridden by users below
    - owner: 'romkatv'
      repo: 'powerlevel10k'
      exec: ''
      enabled: true
